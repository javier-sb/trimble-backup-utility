name: Build trimble-backup-utility (Windows)

permissions:
  contents: write

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Build executable
        run: |
          python -m PyInstaller --clean --onefile --add-data "assets;assets" --add-data "adb;adb" --icon=assets\trimble-backup-utility.ico --version-file=version_info.txt --name "Trimble Backup Utility" main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Trimble-Backup-Utility
          path: dist/*.exe

      - name: Create GitHub Release and upload EXE
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}